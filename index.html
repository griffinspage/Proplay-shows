<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movie Website</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=search" />
  
</head>

  <header class="site-header">
    <div class="logo">
      <a href="#">🎬 Proplay Shows</a>
    </div>
    <nav class="nav-links">
      <ul>
        <li><a href="#">Home</a></li>
        <li><a href="#">Movies</a></li>
        <li><a href="#">TV Shows</a></li>
        <li><a href="#">Genres</a></li>
        <li><a href="#">Top Rated</a></li>
        <li><a href="#">Contact</a></li>
      </ul>
    </nav>
  </header>


  <!-- Main -->
   <body>
    
    <div class="search-bar">
        <span class="search-icon material-symbols-outlined">search</span>
        <input class="search-input" type="search" placeholder="Search for Movie">
    </div>

    <div class="container">
        <h1>🎬Proplays Movie Hub</h1>

        <div class="row">
            <h2>Trailer Player</h2>
            <div id="trailerPlayer"></div>
        </div>


        <div class="row">
            <button class="scroll-btn left" onclick="scrollRow('searchResults', -300)">&#10094;</button>
            <h2>Search Results</h2>
            <button class="scroll-btn right" onclick="scrollRow('searchResults', 300)">&#10095;</button>
            <div class="movie-row" id="searchResults"></div>
        </div>


        <!-- Movie Rows -->
        <div class="row">
            <h2>Trending Now</h2>
            <button class="scroll-btn left" onclick="scrollRow('trending', -300)">&#10094;</button>
            <div class="movie-row" id="trending"></div>
            <button class="scroll-btn right" onclick="scrollRow('trending', 300)">&#10095;</button>
        </div>

        <div class="row">
            <h2>Top Rated</h2>
            <button class="scroll-btn left" onclick="scrollRow('topRated', -300)">&#10094;</button>
            <div class="movie-row" id="topRated"></div>
            <button class="scroll-btn right" onclick="scrollRow('topRated', 300)">&#10095;</button>
        </div>

        <div class="row">
            <h2>Popular Movies</h2>
            <button class="scroll-btn left" onclick="scrollRow('popular', -300)">&#10094;</button>
            <div class="movie-row" id="popular"></div>
            <button class="scroll-btn right" onclick="scrollRow('popular', 300)">&#10095;</button>
        </div>

        <div class="row">
            <h2>Drama Series</h2>
            <button class="scroll-btn left" onclick="scrollRow('dramaSeries', -300)">&#10094;</button>
            <div class="movie-row" id="dramaSeries"></div>
            <button class="scroll-btn right" onclick="scrollRow('dramaSeries', 300)">&#10095;</button>
        </div>

        <div class="row">
            <h2>Action Movies</h2>
            <button class="scroll-btn left" onclick="scrollRow('action', -300)">&#10094;</button>
            <div class="movie-row" id="action"></div>
            <button class="scroll-btn right" onclick="scrollRow('action', 300)">&#10095;</button>
        </div>

        <div class="row">
            <h2>Horror Movies</h2>
            <button class="scroll-btn left" onclick="scrollRow('horror', -300)">&#10094;</button>
            <div class="movie-row" id="horror"></div>
            <button class="scroll-btn right" onclick="scrollRow('horror', 300)">&#10095;</button>
        </div>
    </div>


    <!-- JS file -->
 <script src="java.js"></script>
</body>

</html>
